<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <div class="calculator">    
        <input type="text" class="display" disabled />
        <div class="keys">
            <button class="button" oneclick=""clearDisplay()">AC</button>
            <button class="button" oneclick=""deleteLast()">DEL</button>
            <button class="button" oneclick=""appendOperator('%')">%</button>
            <button class="button" oneclick=""appendOperator('/')">/</button>
            <button class="button" oneclick=""appendNumber('7')">7</button>
            <button class="button" oneclick=""appendNumber('8')">8</button>
            <button class="button" oneclick=""appendNumber('9')">9</button>
            <button class="button" oneclick=""appendOperator('*')">x</button>
            <button class="button" oneclick=""appendNumber('4')">4</button>
            <button class="button" oneclick=""appendNumber('5')">5</button>
            <button class="button" oneclick=""appendNumber('6')">6</button>
            <button class="button" oneclick=""appendOperator('-')">-</button>
            <button class="button" oneclick=""appendNumber('1')">1</button>
            <button class="button" oneclick=""appendNumber('2')">2</button>
            <button class="button" oneclick=""appendNumber('3')">3</button>
            <button class="button" oneclick=""appendOperator('+')">+</button>
            <button class="button" oneclick=""appendNumber('0')">0</button>
            <button class="button" oneclick=""appendDoubleZero()">00</button>
            <button class="button" oneclick=""appendDecimal()">.</button>
            <button class="button" oneclick=""calculate()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
